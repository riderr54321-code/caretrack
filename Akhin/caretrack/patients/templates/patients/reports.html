{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4" style="background: #f4f7f6; min-height: 100vh;">
  <div class="container-lg">
    <div class="row mb-4">
      <div class="col-12">
        <h2 class="fw-bold" style="color: #1a3f47;">
          <i class="bi bi-graph-up"></i> Hospital Analytics
        </h2>
        <p class="text-muted">Overview of CareTrack Activity</p>
      </div>
    </div>
    <style>
      .report-card {
        transition: transform 0.2s, box-shadow 0.2s;
        text-decoration: none !important;
        display: block;
      }
      .report-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0,0,0,0.1) !important;
      }
    </style>
    <div class="row g-4 mb-4">
      <div class="col-md-3">
        <a href="{% url 'home' %}" class="report-card h-100">
          <div class="card h-100" style="border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #17a2b8;">
            <div class="card-body p-4 text-center">
              <div style="font-size: 2.5rem; color: #17a2b8; margin-bottom: 15px;"><i class="bi bi-people-fill"></i></div>
              <h3 style="font-weight: 700; color: #333; margin: 0;">{{ total_patients }}</h3>
              <p class="text-muted mb-0" style="font-weight: 500;">Active Patients</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <a href="{% url 'medicines_list' %}" class="report-card h-100">
          <div class="card h-100" style="border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #28a745;">
            <div class="card-body p-4 text-center">
              <div style="font-size: 2.5rem; color: #28a745; margin-bottom: 15px;"><i class="bi bi-capsule"></i></div>
              <h3 style="font-weight: 700; color: #333; margin: 0;">{{ medicines_count }}</h3>
              <p class="text-muted mb-0" style="font-weight: 500;">Medicines in DB</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <a href="{% url 'home' %}" class="report-card h-100">
          <div class="card h-100" style="border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #ffc107;">
            <div class="card-body p-4 text-center">
              <div style="font-size: 2.5rem; color: #ffc107; margin-bottom: 15px;"><i class="bi bi-file-earmark-medical-fill"></i></div>
              <h3 style="font-weight: 700; color: #333; margin: 0;">{{ total_prescriptions }}</h3>
              <p class="text-muted mb-0" style="font-weight: 500;">Issued Prescriptions</p>
            </div>
          </div>
        </a>
      </div>
      <div class="col-md-3">
        <a href="{% url 'deleted_patients' %}" class="report-card h-100">
          <div class="card h-100" style="border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 5px solid #dc3545;">
            <div class="card-body p-4 text-center">
              <div style="font-size: 2.5rem; color: #dc3545; margin-bottom: 15px;"><i class="bi bi-trash-fill"></i></div>
              <h3 style="font-weight: 700; color: #333; margin: 0;">{{ deleted_patients }}</h3>
              <p class="text-muted mb-0" style="font-weight: 500;">Archived Records</p>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
