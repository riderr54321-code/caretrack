{% load static %}
<!DOCTYPE html>
<html>

<head>
  <title>CareTrack - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #1a3f47 0%, #2a5a68 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      padding: 20px;
    }

    .login-card {
      background: rgba(52, 112, 125, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      padding: 50px 40px;
    }

    .login-title {
      text-align: center;
      margin-bottom: 40px;
      font-size: 36px;
      font-weight: 700;
      color: #00ff00;
      letter-spacing: 2px;
    }

    .login-subtitle {
      text-align: center;
      color: rgba(255, 255, 255, 0.8);
      font-size: 0.95rem;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      color: #ffffff;
      font-weight: 600;
      margin-bottom: 10px;
      display: block;
      font-size: 0.95rem;
    }

    .password-input-group {
      position: relative;
    }

    .form-control {
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 12px 16px;
      color: #333;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      background: #ffffff;
      border-color: #00ff00;
      box-shadow: 0 0 0 0.2rem rgba(0, 255, 0, 0.25);
      color: #333;
    }

    .form-control::placeholder {
      color: #999;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
    }

    .password-toggle:hover {
      color: #00ff00;
    }

    .alert-danger {
      background: rgba(255, 68, 68, 0.2);
      border: 1px solid rgba(255, 68, 68, 0.5);
      color: #ff6b6b;
      border-radius: 12px;
      margin-bottom: 20px;
      padding: 12px 16px;
    }

    .btn-login {
      width: 100%;
      background: #00ff00;
      border: none;
      padding: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-top: 25px;
      border-radius: 12px;
      color: #1a3f47;
      font-size: 1.05rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .btn-login:hover {
      background: #00dd00;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(0, 255, 0, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .login-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #ffffff;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .login-link:hover {
      color: #00ff00;
      text-decoration: underline;
    }

    .icon-hospital {
      text-align: center;
      font-size: 3rem;
      color: #00ff00;
      margin-bottom: 20px;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
      margin: 20px 0;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-card">
      <div class="icon-hospital">
        <i class="bi bi-hospital"></i>
      </div>

      <h2 class="login-title">CareTrack</h2>
      <p class="login-subtitle">Healthcare Management System</p>

      {% if error %}
      <div class="alert alert-danger">
        <i class="bi bi-exclamation-triangle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="POST">
        {% csrf_token %}

        <div class="form-group">
          <label for="username" class="form-label">
            <i class="bi bi-person"></i> Username
          </label>
          <input type="text" id="username" name="username" class="form-control" required
            placeholder="Enter your username">
        </div>

        <div class="form-group">
          <label for="password" class="form-label">
            <i class="bi bi-lock"></i> Password
          </label>
          <div class="password-input-group">
            <input type="password" id="password" name="password" class="form-control" required
              placeholder="Enter your password">
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <i class="bi bi-eye" id="toggleIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-login">
          <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
      </form>

      <div class="divider"></div>

      <a href="{% url 'register' %}" class="login-link">
        Don't have an account? <span style="color: #00ff00;">Register here</span>
      </a>
    </div>
  </div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        toggleIcon.classList.remove('bi-eye');
        toggleIcon.classList.add('bi-eye-slash');
      } else {
        passwordInput.type = 'password';
        toggleIcon.classList.remove('bi-eye-slash');
        toggleIcon.classList.add('bi-eye');
      }
    }
  </script>
</body>

</html>
