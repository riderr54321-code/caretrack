{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0" style="border-radius: 12px;">
        <div class="card-body p-4 text-center">
          <i class="bi bi-arrow-counterclockwise text-success mb-3" style="font-size: 3rem;"></i>
          <h4 class="mb-3">Restore Patient</h4>
          <p class="text-muted">Are you sure you want to restore <strong>{{ patient.name }}</strong>?</p>
          <form method="POST" action="{% url 'restore_patient_confirm' patient.id %}">
            {% csrf_token %}
            <div class="d-flex gap-3 justify-content-center mt-4">
              <a href="{% url 'deleted_patients' %}" class="btn btn-light px-4">Cancel</a>
              <button type="submit" class="btn btn-success px-4">Yes, Restore</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
